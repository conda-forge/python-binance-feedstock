schema_version: 1

context:
  name: python-binance
  version: "1.0.36"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: d7b0668ff1b620b30d95b52f9f61b557748eac2d6c4d5f17fe21c356e5e0c541

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - setuptools
    - python ${{ python_min }}.*
  run:
    - aiohttp
    - dateparser
    - python >=${{ python_min }}
    - requests
    - six
    - ujson
    - pycryptodome
    - websockets

tests:
  - python:
      imports:
        - binance
      pip_check: true
      python_version: ${{ python_min }}

about:
  license: MIT
  license_file: LICENSE
  summary: Binance Exchange API python implementation for automated trading
  description: |
    This is an unofficial Python wrapper for the Binance exchange REST API
    v3.
  homepage: https://github.com/sammchardy/python-binance
  repository: https://github.com/sammchardy/python-binance
  documentation: https://python-binance.readthedocs.io/

extra:
  recipe-maintainers:
    - jan-janssen
